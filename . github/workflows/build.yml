name: Build Arista Extension
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build rpm
          pip install cython switools

      - name: Meson Build (Compile .pyx to .so)
        run: |
          meson setup builddir
          meson compile -C builddir

      - name: Package SWIX
        run: |
          # Assumes your RPM was generated in the build step
          swix-create -i manifest.yaml my-extension.swix builddir/*.rpm

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arista-extension
          path: my-extension.swix
